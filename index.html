<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveSwipe Full App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    background: url("https://images.unsplash.com/photo-1529333166437-7750a6dd5a70") center/cover no-repeat;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
}

/* TOP NAV */
.navbar {
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    padding: 10px;
    color: white;
    align-items: center;
}

.navbar button {
    border: none;
    padding: 8px 10px;
    border-radius: 10px;
    background: white;
}

/* MENU */
.menu {
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
}

.menu button {
    border: none;
    padding: 8px 12px;
    border-radius: 20px;
    cursor: pointer;
}

/* CONTAINER */
.container {
    position: relative;
    z-index: 5;
    height: calc(100vh - 90px);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN */
.login {
    text-align: center;
    color: white;
}

.login input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
    margin: 5px;
}

.login button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
}

/* CARD */
.card {
    width: 90%;
    max-width: 340px;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    touch-action: none;
}

.card img {
    width: 100%;
    height: 340px;
    object-fit: cover;
}

.card h2 {
    margin: 10px;
    text-align: center;
}

.card p {
    text-align: center;
    color: gray;
}

/* MATCH LIST */
.list {
    width: 90%;
    max-width: 340px;
    background: white;
    border-radius: 20px;
    padding: 10px;
    height: 400px;
    overflow-y: auto;
}

.user {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
}

/* CHAT */
.chatBox {
    width: 90%;
    max-width: 340px;
    background: white;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    height: 420px;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    padding: 8px;
    margin: 5px;
    border-radius: 10px;
    max-width: 80%;
}

.me {
    background: #ff4d6d;
    color: white;
    align-self: flex-end;
}

.them {
    background: #eee;
}

.chatInput {
    display: flex;
}

.chatInput input {
    flex: 1;
    padding: 10px;
    border: none;
}

.chatInput button {
    border: none;
    background: #28a745;
    color: white;
    padding: 10px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="navbar">
    <button onclick="home()">🏠</button>
    <span>❤️ LoveSwipe Full</span>
    <button onclick="logout()">Exit</button>
</div>

<div class="menu">
    <button onclick="showTab('swipe')">Swipe</button>
    <button onclick="showTab('matches')">Matches</button>
    <button onclick="showTab('chat')">Chat</button>
</div>

<div class="container">

<!-- LOGIN -->
<div id="login" class="login">
    <h2>Find Love 💕</h2>
    <input id="name" placeholder="Enter name"><br>
    <button onclick="start()">Start</button>
</div>

<!-- SWIPE -->
<div id="swipe" style="display:none;"></div>

<!-- MATCH LIST -->
<div id="matches" class="list" style="display:none;"></div>

<!-- CHAT -->
<div id="chat" class="chatBox" style="display:none;">
    <div class="messages" id="messages"></div>
    <div class="chatInput">
        <input id="msg" placeholder="Type message">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

</div>

<script>
let profiles = [
    {name:"Ana", bio:"Coffee ☕", img:"https://images.unsplash.com/photo-1524504388940-b1c1722653e1"},
    {name:"Lia", bio:"Travel ✈️", img:"https://images.unsplash.com/photo-1544005313-94ddf0286df2"},
    {name:"Mika", bio:"Gamer 🎮", img:"https://images.unsplash.com/photo-1502685104226-ee32379fefbe"}
];

let index = 0;
let currentChat = null;
let matches = {};
let activeChatUser = null;

function start(){
    document.getElementById("login").style.display="none";
    showTab('swipe');
}

function showTab(tab){
    document.getElementById("swipe").style.display="none";
    document.getElementById("matches").style.display="none";
    document.getElementById("chat").style.display="none";

    if(tab==="swipe") renderSwipe();
    if(tab==="matches") renderMatches();
    if(tab==="chat") document.getElementById("chat").style.display="flex";
}

/* SWIPE */
function renderSwipe(){
    let c = document.getElementById("swipe");
    c.style.display="block";
    c.innerHTML="";

    let p = profiles[index];

    let card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
        <img src="${p.img}">
        <h2>${p.name}</h2>
        <p>${p.bio}</p>
    `;

    let startX=0, moveX=0;

    card.addEventListener("touchstart",e=>{
        startX=e.touches[0].clientX;
    });

    card.addEventListener("touchmove",e=>{
        moveX=e.touches[0].clientX-startX;
        card.style.transform=`translateX(${moveX}px) rotate(${moveX/10}deg)`;
    });

    card.addEventListener("touchend",()=>{
        if(moveX>100){
            like(p.name);
        } else if(moveX<-100){
            next();
        } else {
            card.style.transform="translateX(0)";
        }
    });

    c.appendChild(card);
}

function like(name){
    if(Math.random()>0.4){
        matches[name]=[];
        alert("💖 It's a match with " + name);
    }
    next();
}

function next(){
    index++;
    if(index>=profiles.length) index=0;
    renderSwipe();
}

/* MATCHES */
function renderMatches(){
    let m=document.getElementById("matches");
    m.style.display="block";
    m.innerHTML="<h3>Matches 💖</h3>";

    for(let name in matches){
        let div=document.createElement("div");
        div.className="user";
        div.innerText=name;
        div.onclick=()=>openChat(name);
        m.appendChild(div);
    }
}

/* CHAT */
function openChat(name){
    activeChatUser=name;
    showTab('chat');
    renderChat();
}

function renderChat(){
    let box=document.getElementById("messages");
    box.innerHTML="";

    if(!matches[activeChatUser]) matches[activeChatUser]=[];

    matches[activeChatUser].forEach(m=>{
        let d=document.createElement("div");
        d.className="msg me";
        d.innerText=m;
        box.appendChild(d);
    });
}

function sendMsg(){
    let input=document.getElementById("msg");
    if(!input.value) return;

    matches[activeChatUser].push(input.value);
    input.value="";
    renderChat();
}

function home(){
    location.reload();
}

function logout(){
    location.reload();
}
</script>

</body>
</html
